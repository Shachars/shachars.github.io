<svg width="680" height="370" viewBox="0 0 680 370" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#444441" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Phase 1 — Teal -->
  <rect x="40" y="20" width="300" height="58" rx="8" fill="#9FE1CB" stroke="#085041" stroke-width="1"/>
  <text x="190" y="43" text-anchor="middle" font-size="13" font-weight="bold" fill="#04342C">1 — CaaS discovery</text>
  <text x="190" y="62" text-anchor="middle" font-size="11" fill="#085041">Advertises AI types, modalities &amp; performance params</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="78" x2="190" y2="104" stroke="#444441" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Phase 2 — Blue -->
  <rect x="40" y="106" width="300" height="58" rx="8" fill="#B5D4F4" stroke="#0C447C" stroke-width="1"/>
  <text x="190" y="129" text-anchor="middle" font-size="13" font-weight="bold" fill="#042C53">2 — Session setup</text>
  <text x="190" y="148" text-anchor="middle" font-size="11" fill="#0C447C">Client selects model; AP loads it; keys exchanged</text>

  <!-- Arrow 2 -->
  <line x1="190" y1="164" x2="190" y2="190" stroke="#444441" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Phase 3 — Purple -->
  <rect x="40" y="192" width="300" height="58" rx="8" fill="#CECBF6" stroke="#3C3489" stroke-width="1"/>
  <text x="190" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#26215C">3 — AI inference</text>
  <text x="190" y="234" text-anchor="middle" font-size="11" fill="#3C3489">Client sends input vector; AP returns output vector</text>

  <!-- Arrow 3 -->
  <line x1="190" y1="250" x2="190" y2="276" stroke="#444441" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Phase 4 — Gray -->
  <rect x="40" y="278" width="300" height="58" rx="8" fill="#D3D1C7" stroke="#444441" stroke-width="1"/>
  <text x="190" y="301" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A">4 — Session teardown</text>
  <text x="190" y="320" text-anchor="middle" font-size="11" fill="#444441">Explicit closure or timer expiry</text>

  <!-- Vertical divider -->
  <line x1="358" y1="14" x2="358" y2="342" stroke="#B4B2A9" stroke-width="0.7" stroke-dasharray="4 3"/>

  <!-- Annotations — Phase 1 -->
  <text x="372" y="49" font-size="11" fill="#2C2C2A">Pre- or post-association</text>

  <!-- Annotations — Phase 2 -->
  <text x="372" y="118" font-size="11" font-weight="bold" fill="#1A1A18">Setup request:</text>
  <text x="372" y="133" font-size="11" fill="#2C2C2A">service hash, session ID,</text>
  <text x="372" y="148" font-size="11" fill="#2C2C2A">security info, model URL</text>
  <text x="372" y="163" font-size="11" font-weight="bold" fill="#1A1A18">Setup response:</text>
  <text x="372" y="178" font-size="11" fill="#2C2C2A">IP, port, key, lifetime</text>

  <!-- Annotations — Phase 3 -->
  <text x="372" y="210" font-size="11" font-weight="bold" fill="#1A1A18">Formats: protobuf, ONNX</text>
  <text x="372" y="226" font-size="11" fill="#2C2C2A">Text / image / voice / video</text>

  <!-- Annotations — Phase 4 -->
  <text x="372" y="307" font-size="11" fill="#2C2C2A">Timer expiry or client/AP request</text>
</svg>
