<svg width="680" height="200" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#444441" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Main timeline axis -->
  <line x1="80" y1="80" x2="615" y2="80" stroke="#444441" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Milestone 1: WNG submission & SG formation — Teal — label BELOW -->
  <circle cx="120" cy="80" r="9" fill="#9FE1CB" stroke="#085041" stroke-width="1.2"/>
  <line x1="120" y1="89" x2="120" y2="106" stroke="#444441" stroke-width="0.7" stroke-dasharray="3 3"/>
  <text x="120" y="118" text-anchor="middle" font-size="12" fill="#2C2C2A">Mar 2026</text>
  <text x="120" y="134" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A1A18">WNG submission</text>
  <text x="120" y="150" text-anchor="middle" font-size="12" fill="#2C2C2A">&amp; SG formation</text>

  <!-- Milestone 2: Study Group starts — Blue — label ABOVE -->
  <circle cx="240" cy="80" r="9" fill="#85B7EB" stroke="#0C447C" stroke-width="1.2"/>
  <line x1="240" y1="71" x2="240" y2="48" stroke="#444441" stroke-width="0.7" stroke-dasharray="3 3"/>
  <text x="240" y="42" text-anchor="middle" font-size="12" fill="#2C2C2A">May 2026</text>
  <text x="240" y="27" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A1A18">Study Group starts</text>

  <!-- Milestone 3: SASB PAR approval — Blue — label BELOW -->
  <circle cx="365" cy="80" r="9" fill="#85B7EB" stroke="#0C447C" stroke-width="1.2"/>
  <line x1="365" y1="89" x2="365" y2="106" stroke="#444441" stroke-width="0.7" stroke-dasharray="3 3"/>
  <text x="365" y="118" text-anchor="middle" font-size="12" fill="#2C2C2A">Sep 2026</text>
  <text x="365" y="134" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A1A18">SASB PAR approval</text>

  <!-- Milestone 4: Task Group starts — Purple — label ABOVE -->
  <circle cx="490" cy="80" r="9" fill="#AFA9EC" stroke="#3C3489" stroke-width="1.2"/>
  <line x1="490" y1="71" x2="490" y2="48" stroke="#444441" stroke-width="0.7" stroke-dasharray="3 3"/>
  <text x="490" y="42" text-anchor="middle" font-size="12" fill="#2C2C2A">Nov 2026</text>
  <text x="490" y="27" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A1A18">Task Group starts</text>

  <!-- Milestone 5: Draft 0.1 — Purple — label BELOW -->
  <circle cx="600" cy="80" r="9" fill="#AFA9EC" stroke="#3C3489" stroke-width="1.2"/>
  <line x1="600" y1="89" x2="600" y2="106" stroke="#444441" stroke-width="0.7" stroke-dasharray="3 3"/>
  <text x="600" y="118" text-anchor="middle" font-size="12" fill="#2C2C2A">Jul 2027</text>
  <text x="600" y="134" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A1A18">Draft 0.1</text>
  <text x="600" y="150" text-anchor="middle" font-size="12" fill="#2C2C2A">(target)</text>
</svg>
