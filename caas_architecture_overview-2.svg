<svg width="680" height="310" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Left box: Client devices  x=10..140 -->
  <rect x="10" y="40" width="130" height="225" rx="10" fill="#D3D1C7" stroke="#444441" stroke-width="1"/>
  <text x="75" y="63" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A">Client devices</text>
  <text x="75" y="80" text-anchor="middle" font-size="11" fill="#444441">Limited compute</text>
  <line x1="18" y1="91" x2="132" y2="91" stroke="#888780" stroke-width="0.7"/>
  <text x="20" y="112" font-size="11" fill="#2C2C2A">— Wi-Fi camera</text>
  <text x="20" y="133" font-size="11" fill="#2C2C2A">— Home robot</text>
  <text x="20" y="154" font-size="11" fill="#2C2C2A">— IoT sensor</text>
  <text x="20" y="175" font-size="11" fill="#2C2C2A">— Voice assistant</text>
  <text x="20" y="196" font-size="11" fill="#2C2C2A">— Thin client</text>

  <!-- Center box: CaaS AP  x=215..415 -->
  <rect x="215" y="20" width="200" height="265" rx="10" fill="#B5D4F4" stroke="#0C447C" stroke-width="1.2"/>
  <text x="315" y="44" text-anchor="middle" font-size="13" font-weight="bold" fill="#042C53">CaaS Wi-Fi AP</text>
  <text x="315" y="62" text-anchor="middle" font-size="11" fill="#185FA5">Edge compute platform</text>
  <line x1="223" y1="73" x2="407" y2="73" stroke="#185FA5" stroke-width="0.7" opacity="0.5"/>
  <text x="225" y="95"  font-size="11" fill="#042C53">— CaaS discovery</text>
  <text x="225" y="116" font-size="11" fill="#042C53">— Session management</text>
  <text x="225" y="137" font-size="11" fill="#042C53">— AI inference engine</text>
  <text x="225" y="158" font-size="11" fill="#042C53">— Model loader</text>
  <text x="225" y="179" font-size="11" fill="#042C53">— WPA3 security</text>
  <text x="225" y="200" font-size="11" fill="#042C53">— A2A agent discovery</text>
  <text x="225" y="221" font-size="11" fill="#042C53">— Input / output vectors</text>

  <!-- Right box: Model repository  x=490..670 -->
  <rect x="490" y="40" width="180" height="225" rx="10" fill="#9FE1CB" stroke="#085041" stroke-width="1"/>
  <text x="580" y="63" text-anchor="middle" font-size="13" font-weight="bold" fill="#04342C">Model repository</text>
  <text x="580" y="80" text-anchor="middle" font-size="11" fill="#0F6E56">Neutral industry body</text>
  <line x1="498" y1="91" x2="662" y2="91" stroke="#0F6E56" stroke-width="0.7" opacity="0.5"/>
  <text x="500" y="112" font-size="11" fill="#04342C">— Certified models</text>
  <text x="500" y="133" font-size="11" fill="#04342C">— Certification auth.</text>
  <text x="500" y="154" font-size="11" fill="#04342C">— Cloud AI services</text>
  <text x="500" y="175" font-size="11" fill="#04342C">— A2A agent hub</text>
  <text x="500" y="196" font-size="11" fill="#04342C">— Model download URL</text>

  <!--
    Gap left↔center: x=140 to x=215, midpoint x=177
    Gap center↔right: x=415 to x=490, midpoint x=452
    Labels are centered at these midpoints.
    "AI offload →" ~72px wide → spans 141..213  ✓
    "← results"   ~55px wide → spans 150..205  ✓
    "model fetch"  ~61px wide → spans 422..483  ✓
  -->

  <!-- Arrows and labels: Client ↔ AP -->
  <text x="177" y="140" text-anchor="middle" font-size="10" fill="#2C2C2A">AI offload →</text>
  <line x1="141" y1="148" x2="213" y2="148" stroke="#2C2C2A" stroke-width="1.4" marker-end="url(#arr)"/>

  <line x1="214" y1="165" x2="142" y2="165" stroke="#2C2C2A" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="177" y="178" text-anchor="middle" font-size="10" fill="#2C2C2A">← results</text>

  <!-- Arrow and label: AP → Model repo -->
  <text x="452" y="150" text-anchor="middle" font-size="10" fill="#2C2C2A">model fetch</text>
  <line x1="416" y1="160" x2="488" y2="160" stroke="#2C2C2A" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- Bottom badge -->
  <rect x="215" y="297" width="200" height="15" rx="4" fill="#B5D4F4" stroke="#0C447C" stroke-width="0.7"/>
  <text x="315" y="308" text-anchor="middle" font-size="10" fill="#042C53">IEEE 802.11 AI Offload amendment</text>
</svg>
